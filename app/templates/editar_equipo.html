<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Equipo</title>
</head>
<body>
  <h1>Editar equipo</h1>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div style="color: {% if category == 'error' %}red{% else %}green{% endif %}; font-weight:bold;">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form action="{{ url_for('equipos.actualizar_equipo') }}" method="POST">
    <input type="hidden" name="id" value="{{ equipo[0] }}">

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" value="{{ equipo[1] }}" required><br><br>

    <label for="estado">Activo:</label>
    <input type="checkbox" id="estado" name="estado" {% if equipo[2] %}checked{% endif %}><br><br>

    <button type="submit">Actualizar</button>
  </form>

  <a href="{{ url_for('equipos.listar_equipos') }}">Volver</a>
</body>
</html>
