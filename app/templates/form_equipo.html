<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Equipo</title>
</head>
<body>
  <h1>Registrar nuevo equipo</h1>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div style="color: {% if category == 'error' %}red{% else %}green{% endif %}; font-weight:bold;">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form action="{{ url_for('equipos.insertar_equipo') }}" method="POST">
    <label for="nombre">Nombre del equipo:</label>
    <input type="text" id="nombre" name="nombre" required><br><br>

    <label for="estado">Activo:</label>
    <input type="checkbox" id="estado" name="estado" checked><br><br>

    <button type="submit">Guardar</button>
  </form>

  <a href="{{ url_for('equipos.listar_equipos') }}">Ver lista de equipos</a>
</body>
</html>
