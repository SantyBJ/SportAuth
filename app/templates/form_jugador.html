<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Jugador</title>
</head>
<body>
  <h1>Registrar Jugador</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul>
        {% for category, message in messages %}
          <li style="color: {% if category == 'error' %}red{% else %}green{% endif %}">
            <strong>{{ category|capitalize }}:</strong> {{ message }}
          </li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <form action="{{ url_for('jugadores.insertar_jugador') }}" method="post">
    <label for="cedula">Cédula:</label>
    <input type="number" id="cedula" name="cedula" value="{{ cedula or '' }}" required>
    <br><br>

    <label for="nombres">Nombres:</label>
    <input type="text" id="nombres" name="nombres" value="{{ nombres or '' }}" required>
    <br><br>

    <label for="apellidos">Apellidos:</label>
    <input type="text" id="apellidos" name="apellidos" value="{{ apellidos or '' }}" required>
    <br><br>

    <label for="genero">Género:</label>
    <select id="genero" name="genero" required>
      <option value="M" {% if genero == 'M' %}selected{% endif %}>Masculino</option>
      <option value="F" {% if genero == 'F' %}selected{% endif %}>Femenino</option>
    </select>
    <br><br>

    <label for="profesionalismo">Profesionalismo:</label>
    <select id="profesionalismo" name="profesionalismo" required>
      {% for p in profesionalismos %}
        <option value="{{ p[0] }}" {% if p[0]|string == profesionalismo|string %}selected{% endif %}>
          {{ p[1] }}
        </option>
      {% endfor %}
    </select>
    <br><br>

    <button type="submit">Guardar</button>
  </form>

  <br>
  <a href="{{ url_for('jugadores.listar_jugadores') }}">Volver a la lista</a>
</body>
</html>
